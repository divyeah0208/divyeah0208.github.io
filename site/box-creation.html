<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Box Model</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            margin: 0;
            padding: 0;
            background-color: beige;
            
        }
        #box{
            background-color: brown;
            padding: 10px 10px 10px 10px;
            border: 20px solid black;
            width: 300px;
            margin-top: 20px;
           
        }
        #content{
            background-color: teal;
        }
        h1{
            margin-bottom: 30px;
        }

    </style>
</head>
<body>
    <h1>The Box Model</h1>
    <div id="box">
        <div id="content">Education in India is primarily managed by the state-run public education system, which falls under the command of the government at three levels: central, state and local.

        </div>
    </div>
    
</body>
</html>
