<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Styling</title>
    <style>
        .style{
            font-family:Georgia, 'Times New Roman', Times, serif;
            color:aquamarine;
            font-style: italic;
            font-weight: 900;
            font-size: 24px;
            text-transform: capitalize;
            text-align: right;
        }
    </style>
</head>
<body>
    <p class="style">Education in India is primarily managed by the state-run public education system, which falls under the command of the government at three levels: central, state and local.</p>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting Font Size</title>
    <style>
      body{
        font-size: 120%;
      }
    
    </style>
</head>
<body>
    <div>Regular Text</div>
    <div style="font-size: 2em;">4em text 
        <div style="font-size: 2em;">2em text 
            <div style="font-size: .5em;"> 2em again!</div>

        </div>
    </div>
    
</body>
</html>
